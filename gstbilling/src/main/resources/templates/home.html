<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GST Billing System</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 20px 40px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        nav {
            background-color: #34495e;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        nav a {
            color: #ecf0f1;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #1abc9c;
        }

        main {
            padding: 40px;
            text-align: center;
        }

        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 20px 0;
        }

        footer {
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>GST Billing System 🚀</h1>
</header>

<nav>
    <a href="/customers">Add Customer</a>
    <a href="/products">Add Product</a>
    <a href="/invoice/create">Create Invoice</a>
    <a href="/invoice/list">View Invoices</a>
</nav>

<main>
    <hr>
    <p>Welcome to the GST Billing System. Use the navigation above to manage customers, products, and invoices.</p>
</main>

<footer>
    &copy; 2026 GST Billing System. All rights reserved.
</footer>

</body>
</html>
