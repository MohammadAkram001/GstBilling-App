<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>GST Billing System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.navbar{
    background:#1f3b57;
}

.navbar-brand,
.nav-link{
    color:white !important;
    font-weight:bold;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

.dashboard-title{
    font-weight:bold;
    margin-bottom:30px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container-fluid">

<a class="navbar-brand" href="#">
GST Billing System 🚀
</a>

<div>

<a class="nav-link d-inline" href="/customers">Customers</a>

<a class="nav-link d-inline" href="/products">Products</a>

<a class="nav-link d-inline" href="/invoice/create">Create Invoice</a>

<a class="nav-link d-inline" href="/invoice/list">Invoices</a>

<form th:action="@{/logout}" method="post" class="d-inline">
<button class="btn btn-danger btn-sm">
Logout
</button>
</form>

</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="dashboard-title">
Dashboard Overview
</h2>

<div class="row">

<div class="col-md-4">

<div class="card p-4 text-center">

<h4>Total Customers</h4>

<h1 th:text="${customers}"></h1>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 text-center">

<h4>Total Products</h4>

<h1 th:text="${products}"></h1>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 text-center">

<h4>Total Invoices</h4>

<h1 th:text="${invoices}"></h1>

</div>

</div>

</div>

</div>

</body>
</html>
